url: https://raw.githubusercontent.com/api-evangelist/b3-exchange/refs/heads/main/apis.yml
name: B3 (Brasil Bolsa Balcão)
kind: company
description: B3 S.A. - Brasil, Bolsa, Balcão is the Brazilian exchange and financial
  market infrastructure operator formed by the 2017 merger of BM&FBOVESPA and Cetip,
  running trading, clearing, central depository, and OTC registration for equities,
  derivatives, fixed income, and FX. Its public B3 for Developers portal documents
  114 B2B REST APIs (OAuth 2.0 client credentials and ROPC) across investor-area,
  OTC (Balcão), listed-markets, Tesouro Direto, Banco B3, and insurance domains.
  Real-time market data is distributed through the UMDF multicast feed (FIX/FAST
  and Binary SBE, L1/L2) via authorized distributors, and end-of-day plus reference
  data through the UP2DATA file service (TXT/CSV/JSON/XML via client software or
  cloud). All API and data access is contract-gated for institutions - B3 explicitly
  offers no self-serve access for individuals.
