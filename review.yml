  specProvenance: |
    The six files under openapi/ were harvested VERBATIM on 2026-07-21 from
    the B3 for Developers portal's public, unauthenticated AJAX endpoint
    (index.php?option=com_apiportal&task=ajaxrequest.swaggerLoad&apiId=...,
    an Axway API Manager-backed Joomla portal). They are complete API
    definitions in Axway's Swagger 1.1 discovery JSON format (operations,
    models, auth profiles, base paths), not OpenAPI 3.x - the portal's
    Swagger 2.0/3.0 file downloads require a portal login and returned HTTP
    500 anonymously. Harvested: Tesouro Direto Bonds, Tesouro Direto
    Positions, ISIN API, OTC NoMe Public-Info, B3 Investidor - Posição,
    B3 Investidor - Movimentação. Nothing was fabricated.
